services:
  - type: web
    name: datapilot-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # Set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.9